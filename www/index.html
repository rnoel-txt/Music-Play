<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="initial-scale=1, width=device-width, viewport-fit=cover">
    <title>Blue Hour Player</title>
    <style>
        /* Pengaturan Dasar & Latar Belakang Dark Mode */
        body {
            background-color: #12161a; /* Abu-abu sangat gelap dengan sentuhan biru malam */
            color: #e3e8ec; /* Warna teks putih keabu-abuan biar ga silau */
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        /* Header Atas */
        header {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #657b8c; /* Warna teks redup estetik */
            font-weight: 600;
        }

        /* Wadah Utama Musik (Tengah) */
        .player-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 320px;
        }

        /* Cover Album / Ilustrasi Kaset */
        .cover-art {
            width: 260px;
            height: 260px;
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5), 
                        0 0 0 1px rgba(255, 255, 255, 0.05);
            margin-bottom: 35px;
            position: relative;
            overflow: hidden;
        }

        /* Efek Gradasi Tambahan di Cover biar ala Blue Hour */
        .cover-art::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(circle at top left, rgba(56, 189, 248, 0.15), transparent);
        }

        .cover-art svg {
            width: 80px;
            height: 80px;
            fill: #38bdf8; /* Warna ikon biru laut */
            filter: drop-shadow(0 0 10px rgba(56, 189, 248, 0.3));
        }

        /* Informasi Judul Lagu & Artis */
        .song-info {
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
        }

        .song-title {
            font-size: 22px;
            font-weight: 700;
            margin: 0 0 8px 0;
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-artist {
            font-size: 15px;
            color: #8ba3b5;
            margin: 0;
        }

        /* Status Putar */
        .status-text {
            font-size: 12px;
            color: #475569;
            margin-top: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Kontrol Utama (Bawah) */
        .controls {
            margin-top: 20px;
        }

        /* Tombol Play/Pause Bulat Estetik */
        .play-btn {
            background: linear-gradient(135deg, #0284c7, #0369a1); /* Gradasi Biru */
            color: white;
            border: none;
            width: 84px;
            height: 84px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 25px rgba(3, 105, 161, 0.4),
                        inset 0 2px 4px rgba(255, 255, 255, 0.2);
            transition: transform 0.2s, filter 0.2s;
        }

        .play-btn:active {
            transform: scale(0.95);
            filter: brightness(0.9);
        }

        .play-btn svg {
            width: 32px;
            height: 32px;
            fill: white;
        }
    </style>
</head>
<body>

    <header>Now Playing</header>

    <div class="player-container">
        <!-- Cover Art Komponen -->
        <div class="cover-art">
            <!-- Ikon Musik SVG -->
            <svg viewBox="0 0 24 24"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
        </div>

        <!-- Detail Informasi Lagu -->
        <div class="song-info">
            <h1 class="song-title">Chill Lofi Beats</h1>
            <p class="song-artist">Blue Hour Station</p>
            <div id="status" class="status-text">Masing Berhenti</div>
        </div>

        <!-- Tombol Kontrol -->
        <div class="controls">
            <button id="playBtn" class="play-btn">
                <!-- Ikon Play Bawaan (Bentuk Segitiga) -->
                <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </button>
        </div>
    </div>

    <div></div> <!-- Spacer bawah pas flexbox -->

    <script>
        // Sumber Musik: Menggunakan link audio streaming mp3 publik untuk tes
        const audioUrl = "https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3";
        const audio = new Audio(audioUrl);
        let isPlaying = false;

        const playBtn = document.getElementById('playBtn');
        const statusTxt = document.getElementById('status');
        const playIcon = document.getElementById('playIcon');

        // Path Ikon SVG untuk Play dan Pause
        const playPath = "M8 5v14l11-7z";
        const pausePath = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";

        playBtn.addEventListener('click', () => {
            if (!isPlaying) {
                statusTxt.innerText = "Menghubungkan...";
                audio.play()
                    .then(() => {
                        playIcon.innerHTML = `<path d="${pausePath}"/>`;
                        statusTxt.innerText = "Memutar Musik";
                        isPlaying = true;
                    })
                    .catch(error => {
                        statusTxt.innerText = "Gagal memutar audio";
                        console.error(error);
                    });
            } else {
                audio.pause();
                playIcon.innerHTML = `<path d="${playPath}"/>`;
                statusTxt.innerText = "Musik Dijeda";
                isPlaying = false;
            }
        });

        // Event listener jika lagu habis otomatis reset tombol
        audio.addEventListener('ended', () => {
            playIcon.innerHTML = `<path d="${playPath}"/>`;
            statusTxt.innerText = "Selesai Memutar";
            isPlaying = false;
        });
    </script>
</body>
</html>
